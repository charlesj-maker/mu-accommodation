<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="K8uRt6odxxf5046Rxu" />
    <title>MU-accommodation Listings</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .app-bar {
            background-color: #2196F3;
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 500;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }
        .download-banner {
            background: linear-gradient(135deg, #2e7d32, #43a047);
            color: white;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .download-text h4 {
            margin: 0 0 4px 0;
            font-size: 16px;
        }
        .download-text p {
            margin: 0;
            font-size: 12px;
            opacity: 0.9;
        }
        .btn-download-app {
            background-color: white;
            color: #2e7d32;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            font-size: 13px;
            white-space: nowrap;
            display: inline-block;
        }
        .notice-box {
            background-color: #e3f2fd;
            border: 1px solid #bbdefb;
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            color: #0d47a1;
            font-size: 14px;
        }
        .notice-box span {
            font-size: 18px;
            margin-right: 10px;
        }
        .search-container {
            position: relative;
            margin-bottom: 15px;
        }
        .search-box {
            width: 100%;
            padding: 12px 15px 12px 45px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 12px;
            box-sizing: border-box;
            background: white;
            outline: none;
        }
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #2196F3;
            font-size: 18px;
        }
        .listing-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #eaeaea;
        }
        .listing-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .listing-title {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 4px 0;
            color: #111;
        }
        .listing-subtitle {
            font-size: 13px;
            color: #666;
            margin: 0 0 10px 0;
        }
        .price-tag {
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
        }
        .badges {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .badge {
            background-color: #e3f2fd;
            color: #1565c0;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }
        .rooms-badge {
            background-color: #fff3e0;
            color: #e65100;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }
        .action-row {
            display: flex;
            gap: 10px;
            padding: 0 15px 15px 15px;
        }
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            flex: 1;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-call {
            background-color: white;
            color: #2e7d32;
            border: 1px solid #2e7d32;
            flex: 1.2;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
        }
        .btn-location {
            background-color: white;
            color: #2196F3;
            border: 1px solid #2196F3;
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
        }
        .listing-photo-container {
            position: relative;
            background: #000;
            width: 100%;
            height: 220px;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .listing-photo-container::-webkit-scrollbar {
            display: none;
        }
        .listing-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            flex-shrink: 0;
            flex-grow: 0;
            scroll-snap-align: start;
        }
        .photo-id-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }
        .loading-text {
            text-align: center;
            color: #666;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="app-bar">
        <span>MU-accommodation Listings</span>
    </div>

    <div class="container">
        <!-- Download APK Banner -->
        <div class="download-banner">
            <div class="download-text">
                <h4>Get the Android App</h4>
                <p>Browse faster and get instant notifications.</p>
                <p style="font-size: 9px; opacity: 0.7; margin-top: 2px;">SHA-256 Verified</p>
            </div>
            <a href="https://github.com/charlesj-maker/mu-accommodation/releases/download/v1.0.0/app-release.apk" id="apkLink" class="btn-download-app" target="_blank">Download APK</a>
        </div>

        <div class="notice-box">
            <span>ℹ️</span>
            <div>Browse boarding houses freely and speak to the admin for any issues.</div>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-box" placeholder="Search by house name or location..." onkeyup="filterListings()">
        </div>

        <div id="listingsWrapper">
            <div class="loading-text">Loading verified listings...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: ["AIzaSyCjAoyorXNlHxRMzkFgAyiA_1", "L_VcR-X9c"].join(''),
            authDomain: "university-homes-zambia.firebaseapp.com",
            projectId: "university-homes-zambia",
            storageBucket: "university-homes-zambia.appspot.com",
            messagingSenderId: "236985394876",
            appId: "1:236985394876:web:generated"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("houses").where("pendingVerification", "==", false).get().then((querySnapshot) => {
            const wrapper = document.getElementById("listingsWrapper");
            wrapper.innerHTML = ""; 

            if (querySnapshot.empty) {
                wrapper.innerHTML = "<div class='loading-text'>No approved listings available right now.</div>";
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                const houseName = data.houseName || data.name || "Boarding House";
                const location = data.location || "Mulungushi Area";
                const price = data.price || "0";
                const rooms = data.roomsAvailable || "Available";
                const phone = data.phone || "";
                const whatsapp = data.whatsapp || "";
                
                // Location Mapping (GeoPoint & Fallbacks)
                let mapUrl = "#";
                if (data.location && typeof data.location.latitude === 'number' && typeof data.location.longitude === 'number') {
                    mapUrl = `https://www.google.com/maps/search/?api=1&query=${data.location.latitude},${data.location.longitude}`;
                } else {
                    let rawMap = data.mapLink || data.locationLink || data.coordinates || data.latLng || "";
                    if (rawMap.startsWith("http")) {
                        mapUrl = rawMap;
                    } else if (rawMap.includes(",")) {
                        mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(rawMap)}`;
                    } else {
                        mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(houseName + " " + location + " Mulungushi University")}`;
                    }
                }

                // Image Array Handling
                let imagesArray = [];
                if (Array.isArray(data.images) && data.images.length > 0) {
                    imagesArray = data.images;
                } else if (Array.isArray(data.imageUrls) && data.imageUrls.length > 0) {
                    imagesArray = data.imageUrls;
                } else if (data.imageUrl) {
                    imagesArray = [data.imageUrl];
                } else if (data.image) {
                    imagesArray = [data.image];
                } else {
                    imagesArray = ["https://images.unsplash.com/photo-1555854877-bab0e564b8d5?auto=format&fit=crop&w=600&q=80"];
                }

                let imagesHtml = '';
                imagesArray.forEach((imgSrc) => {
                    imagesHtml += `<img src="${imgSrc}" alt="Boarding House Image" class="listing-img">`;
                });

                const docId = doc.id;

                let cardHTML = `
                    <div class="listing-card" data-search="${houseName} ${location}">
                        <div class="listing-header">
                            <div>
                                <div class="listing-title">${houseName}</div>
                                <div class="listing-subtitle">${location}</div>
                                <div class="badges">
                                    <span class="badge">🌐 Wi-Fi</span>
                                    <span class="badge">📖 Study Area</span>
                                </div>
                                <div class="rooms-badge">${rooms} Rooms Available</div>
                            </div>
                            <div class="price-tag">K${price}</div>
                        </div>

                        <div class="action-row">
                            <a href="https://wa.me/${whatsapp}" target="_blank" class="btn-whatsapp">WhatsApp</a>
                            <a href="tel:${phone}" class="btn-call">📞 Call Landlord</a>
                            <a href="${mapUrl}" target="_blank" class="btn-location">📍 Location</a>
                        </div>

                        <div class="listing-photo-container">
                            <span class="photo-id-tag">📷 ${imagesArray.length} Photos (Swipe)</span>
                            ${imagesHtml}
                        </div>
                    </div>
                `;
                wrapper.innerHTML += cardHTML;
            });
        }).catch((error) => {
            console.error("Error getting documents: ", error);
            document.getElementById("listingsWrapper").innerHTML = "<div class='loading-text'>Error loading listings. Check database rules.</div>";
        });

        function filterListings() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('listing-card');
            
            for (let i = 0; i < cards.length; i++) {
                let searchData = cards[i].getAttribute('data-search').toLowerCase();
                if (searchData.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
